apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
      - name: ml
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        securityContext:
          allowPrivilegeEscalation: false 
          readOnlyRootFilesystem: true  

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
spec:
  selector:
    app: ml-service
  ports:
  - port: 80
    targetPort: 5000